services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bridgeline}
      POSTGRES_USER: ${POSTGRES_USER:-bridgeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridgeline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bridgeline}:${POSTGRES_PASSWORD:-bridgeline}@postgres:5432/${POSTGRES_DB:-bridgeline}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-1}
      LLM_MIN_INTERVAL_SECONDS: ${LLM_MIN_INTERVAL_SECONDS:-4.1}
      LLM_MAX_ATTEMPTS: ${LLM_MAX_ATTEMPTS:-3}
      LLM_RETRY_BASE_SECONDS: ${LLM_RETRY_BASE_SECONDS:-1.0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # First-boot synthetic data loader. Runs once after the API is healthy, seeds the
  # Riverside dataset idempotently via the public API, then exits. Gated: it cleanly
  # no-ops until the endpoints in docs/seed-api-contract.md are implemented, so it never
  # blocks `docker compose up`. Stdlib-only (urllib), so no extra image build is needed.
  seed:
    image: python:3.12-slim
    working_dir: /app
    environment:
      BRIDGELINE_API_URL: http://api:8000
      SEED_TOKEN: ${SEED_TOKEN:-}
      SEED_STRICT: ${SEED_STRICT:-0}
      SEED_MAX_WAIT_SECONDS: ${SEED_MAX_WAIT_SECONDS:-120}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./data:/app/data:ro
    command: ["python", "scripts/seed.py"]
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
