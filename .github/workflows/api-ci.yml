name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/schemas/IEPRecord.json"
      - "packages/schemas/ObligationSet.json"
      - "references/idea-citations.md"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/schemas/IEPRecord.json"
      - "packages/schemas/ObligationSet.json"
      - "references/idea-citations.md"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - run: ruff format --check bridgeline tests migrations
      - run: ruff check bridgeline tests migrations
      - run: mypy bridgeline tests
      - run: python -m bridgeline.rules.generate_docs --check
      - run: pytest
