name: Web CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/schemas/**"
      - "data/synthetic/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/schemas/**"
      - "data/synthetic/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run codegen:check
      - run: npm run fixtures:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
